services:
  nacos:
    image: docker.1ms.run/nacos/nacos-server:v2.3.2
    container_name: nacos
    restart: always
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: host.docker.internal
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: root

  redis:
    image: docker.1ms.run/library/redis:7.2
    container_name: redis
    restart: always
    ports:
      - "6500:6379"
    command: redis-server --appendonly yes

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.0
    container_name: rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.1.0
    container_name: rocketmq-broker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - ./rocketmq/broker/conf/broker.conf:/home/rocketmq/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"

  rocketmq-dashboard:
    image: styletang/rocketmq-console-ng:latest
    container_name: rocketmq-dashboard
    restart: always
    ports:
      - "8088:8080"
    environment:
      NAMESRV_ADDR: "rocketmq-namesrv:9876"

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant/storage:/qdrant/storage