server:
  port: 8189

spring:
  application:
    name: sanguosha-backend
  config:
    import:
      - optional:nacos:application.yml
      - optional:nacos:application.yaml
      - optional:nacos:${spring.application.name}
      - optional:nacos:${spring.application.name}.yml
      - optional:nacos:${spring.application.name}.yaml

  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      config:
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        refresh-enabled: true
      discovery:
        enabled: false
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/haowujiang?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6500

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false

app:
  ai:
    provider: langchain4j
  kafka:
    enabled: true
  seckill:
    # Sentinel 流控规则从 Nacos 读取的 data-id
    sentinel-flow-data-id: ${SENTINEL_FLOW_DATA_ID:sanguosha-backend-flow-rules}

haowujiang:
  qdrant:
    host: localhost
    port: 6334
    collection-name: haoclass_customer_service

rocketmq:
  name-server: 127.0.0.1:9876
  # 是否开启自动配置
  producer:
    enable-msg-trace: true
    # 发送同一类消息设置为同一个group，保证唯一默认不需要设置，rocketmq会使用ip@pid（pid代表jvm名字）作为唯一标识
    group: "service-seckill-producer"
    # 消息最大长度 默认 1024 * 4 (4M)
    max-message-size: 4096
    # 发送消息超时时间，默认 3000
    send-message-timeout: 3000
    # 发送消息失败重试次数，默认2
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  # 消费者配置（如果有多个消费者）
  consumer:
    group: "service-seckill-consumer"
    # 从什么位置开始消费: CONSUME_FROM_LAST_OFFSET / CONSUME_FROM_FIRST_OFFSET / CONSUME_FROM_TIMESTAMP
    consume-from-where: CONSUME_FROM_LAST_OFFSET
    # 消费线程池大小
    consume-thread-min: 5
    consume-thread-max: 20